services:
  backend:
    container_name: backend    
    image: backend
    networks:
      - app-network
    environment:
      PORT: 5000  
  nginx:
    depends_on:
      - backend
    container_name: nginx
    image: nginx:stable-alpine3.23-perl
    ports:
      - "80:80"
    networks:
      - app-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

networks:
  app-network:
    driver: bridge          
