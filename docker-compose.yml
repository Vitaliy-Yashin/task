services:
  backend:
    container_name: backend
    image: backend
    networks:
      - app-network
  nginx:
    container_name: nginx
    image: nginx
    ports:
      - "80:80"
    networks:
      - app-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

networks:
  app-network:
    driver: bridge          
